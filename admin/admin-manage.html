<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Admins – Asian3DFrames</title>
  <link rel="stylesheet" href="../assets/css/admin-mobile.css?v=20260411"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0ece8; color: #1a1510; margin: 0; }
    .container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.10); padding: 32px; }

    @media (max-width: 700px) {
      .container {
        max-width: 100vw !important;
        width: 100vw !important;
        margin: 0 !important;
        border-radius: 0 !important;
        padding: 0 0 24px 0 !important;
        box-shadow: none !important;
      }
      .table-wrap {
        margin: 0 !important;
        padding: 0 0 0 0 !important;
        overflow-x: auto !important;
        width: 100vw !important;
        min-width: 0 !important;
      }
    }
    h1 { font-size: 2rem; margin-bottom: 24px; }
    .table-wrap { overflow-x: auto; margin-top: 14px; }
    .admin-table { width: 100%; border-collapse: collapse; margin-bottom: 32px; }
    .admin-table th, .admin-table td { padding: 12px 16px; border-bottom: 1px solid #eee; text-align: left; }
    .admin-table th { background: #faf7f4; font-size: .95rem; }
    .admin-table td { font-size: .97rem; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .actions button { margin-right: 0; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
    .btn-add { background: linear-gradient(135deg,#c8956c,#a0704a); color: #fff; }
    .btn-edit { background: #3b82f6; color: #fff; }
    .btn-delete { background: #ef4444; color: #fff; }
    .form-row { margin-bottom: 18px; }
    .form-row label { display: block; margin-bottom: 6px; font-weight: 600; }
    .form-row input { width: 100%; padding: 10px; border-radius: 6px; border: 1.5px solid #ccc; font-size: 1rem; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,.18); align-items: center; justify-content: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: #fff; padding: 32px; border-radius: 12px; min-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .modal-actions { margin-top: 18px; text-align: right; }
    .alert { margin-bottom: 18px; color: #ef4444; font-weight: 600; }

    /* --- MOBILE FRIENDLY PATCH --- */
    @media (max-width: 700px) {
      .container {
        margin: 0 !important;
        padding: 0 0 24px 0 !important;
        max-width: 100vw !important;
        width: 100vw !important;
        border-radius: 0 !important;
        box-shadow: none !important;
      }
      .table-wrap {
        margin: 0 !important;
        padding: 0 !important;
        overflow-x: auto !important;
        width: 100vw !important;
        min-width: 0 !important;
      }
      h1 { font-size: 1.3rem; margin-bottom: 14px; }
      .btn { padding: 9px 12px; font-size: .85rem; }
      .admin-table { min-width: 0; width: 100%; margin-bottom: 16px; }
      .admin-table th, .admin-table td { padding: 9px 10px; font-size: .82rem; vertical-align: top; }
      .admin-table th:nth-child(1), .admin-table td:nth-child(1) { width: 46px; }
      .admin-table th:nth-child(3), .admin-table td:nth-child(3) { min-width: 96px; }
      .admin-table th:nth-child(4), .admin-table td:nth-child(4) { min-width: 108px; }
      .actions { flex-direction: column; align-items: stretch; gap: 6px; }
      .actions .btn { width: 100%; text-align: center; }
      .modal-content { width: calc(100vw - 24px); min-width: 0; padding: 16px; border-radius: 10px; }
      .modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: initial; }
      .modal-actions .btn { width: 100%; }
      .form-row { margin-bottom: 12px; }
      .form-row label { font-size: .98rem; }
      .form-row input { font-size: .95rem; padding: 9px; }
    }

    @media (max-width: 420px) {
      .container { margin: 8px; padding: 10px; }
      h1 { font-size: 1.12rem; }
      .table-wrap { margin-top: 10px; }
      .admin-table th, .admin-table td { padding: 8px 8px; font-size: .78rem; }
      .modal-content { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Manage Admin Users</h1>
    <button class="btn btn-add" id="addAdminBtn"><i class="fas fa-user-plus"></i> Add Admin</button>
    <div class="table-wrap">
      <table class="admin-table" id="adminTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Admin users will be loaded here -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal for Add/Edit Admin -->
  <div class="modal" id="adminModal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Admin</h2>
      <div class="alert" id="modalAlert" style="display:none;"></div>
      <form id="adminForm">
        <div class="form-row">
          <label for="adminUsername">Username</label>
          <input type="text" id="adminUsername" name="username" required />
        </div>
        <div class="form-row">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" name="password" required />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-add" id="saveBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/admin-manage.js"></script>
</body>
</html>
