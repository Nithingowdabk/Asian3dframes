<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - Asian 3D Frames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#c8956c;--gold-dark:#a0704a;--dark:#1a1510;--mid:#6b5c4e;--light:#faf7f4;
      --radius:14px;--shadow:0 18px 42px rgba(0,0,0,.15);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;display:grid;place-items:center;font-family:'Plus Jakarta Sans',sans-serif;
      background:radial-gradient(1200px 600px at 20% 10%, #f2e6dc 0%, transparent 50%),
                 linear-gradient(135deg, #1a1510 0%, #2e1d12 55%, #1f160f 100%);
      color:#fff;padding:20px;
    }
    .card{
      width:100%;max-width:420px;background:#fff;color:var(--dark);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:30px;
    }
    .brand{font-family:'Playfair Display',sans-serif;font-size:1.8rem;margin-bottom:6px;}
    .brand span{color:var(--gold-dark);}
    .sub{color:var(--mid);font-size:.9rem;margin-bottom:22px;}
    label{display:block;font-size:.82rem;font-weight:600;margin-bottom:8px;color:#2e2620;}
    input{
      width:100%;padding:11px 12px;border:1.5px solid rgba(0,0,0,.13);border-radius:10px;
      outline:none;font-size:.92rem;margin-bottom:14px;
    }
    input:focus{border-color:var(--gold);}
    .btn{
      width:100%;border:none;border-radius:10px;padding:12px 14px;cursor:pointer;
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;
      font-size:.92rem;font-weight:700;
    }
    .status{min-height:20px;margin-top:12px;font-size:.84rem;}
    .hint{margin-top:16px;font-size:.76rem;color:var(--mid);}
  </style>
  <script src="../assets/js/admin-auth.js" defer></script>
</head>
<body>
  <main class="card">
    <h1 class="brand">Asian<span>3D Frames</span> Admin</h1>
    <p class="sub">Sign in to continue</p>

    <form id="adminLoginForm" autocomplete="off">
      <label for="adminUsername">Username</label>
      <input id="adminUsername" name="username" type="text" required/>

      <label for="adminPassword">Password</label>
      <input id="adminPassword" name="password" type="password" required/>

      <button id="adminLoginBtn" class="btn" type="submit">Login</button>
      <p id="loginStatus" class="status"></p>
    </form>

  </main>
</body>
</html>
