<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Albums - Asian3DFrames Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../assets/css/admin-mobile.css?v=20260411" />
  <script src="../assets/js/admin-auth.js" defer></script>
  <script src="../assets/js/admin-sidebar-unify.js?v=20260409" defer></script>
  <script src="../assets/js/admin-mobile.js?v=20260402" defer></script>
  <style>
    :root { --gold:#c8956c; --gold-dark:#a0704a; --dark:#1a1510; --mid:#6b5c4e; --light:#faf7f4; --radius:14px; --sidebar:260px; --shadow:0 8px 28px rgba(0,0,0,.08); }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Bodoni Moda',serif;background:linear-gradient(135deg,#f3e8d8 0%,#e9f0d9 52%,#a8c68a 100%);color:var(--dark);display:flex;}
    .sidebar{width:var(--sidebar);background:linear-gradient(180deg,#d7a174,#bc7f4d);min-height:100vh;position:fixed;left:0;top:0;color:#fff;}
    .logo{padding:26px 22px;border-bottom:1px solid rgba(255,255,255,.08);font-family:'Bodoni Moda',serif;font-size:1.35rem;font-weight:700;}
    .logo span{color:#e8c09a;}
    .nav{padding:16px 0;}
    .nav a{display:flex;gap:10px;align-items:center;padding:12px 22px;color:rgba(255,255,255,.7);text-decoration:none;border-left:3px solid transparent;transition:background .2s, color .2s;}
    .nav a.active,.nav a:hover{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--gold);}
    .main{margin-left:var(--sidebar);flex:1;padding:32px 36px;min-height:100vh;background:linear-gradient(135deg,#f3e8d8 0%,#e9f0d9 52%,#a8c68a 100%);}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
    .title{font-family:'Bodoni Moda',serif;font-size:2.1rem;letter-spacing:.02em;}
    .btn{border:none;border-radius:10px;padding:10px 18px;font-weight:600;cursor:pointer;transition:background .2s, color .2s, box-shadow .2s;}
    .btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;box-shadow:0 2px 8px rgba(200,149,108,.12);}
    .btn.primary:hover{background:linear-gradient(135deg,#a0704a,#c8956c);}
    .card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;padding:24px 0 18px;max-width:900px;margin:0 auto;}
    .toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:18px 24px 12px;border-bottom:1px solid rgba(0,0,0,.06);font-size:1.15rem;font-weight:600;color:var(--mid);background:#faf7f4;}
    .form{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;align-items:center;margin-top:18px;padding:0 24px;}
    .form > *{min-width:0;}
    .form .btn.primary{grid-column:1 / -1;justify-self:start;white-space:nowrap;}
    .input{width:100%;font-size:1rem;padding:10px 14px;border-radius:7px;border:1.5px solid #eee;background:#faf7f4;transition:border-color .2s;}
    .input:focus{border-color:var(--gold);outline:none;}
    .help{padding:10px 24px 0;color:var(--mid);font-size:.92rem;}
    .upload-progress{display:none;padding:8px 24px 0;}
    .upload-progress.is-visible{display:block;}
    .upload-progress-head{display:flex;justify-content:space-between;align-items:center;font-size:.86rem;color:var(--mid);margin-bottom:6px;}
    .upload-progress-track{height:10px;background:#efe7de;border-radius:999px;overflow:hidden;border:1px solid rgba(160,112,74,.18);}
    .upload-progress-fill{height:100%;width:0%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));transition:width .15s linear;}
    .empty{padding:18px 24px;color:var(--mid);}
    .album-list{padding:14px 24px 0;display:grid;gap:14px;}
    .album-item{background:#fff;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(200,149,108,.08);}
    .album-cover{width:54px;height:54px;border-radius:12px;object-fit:cover;border:1px solid rgba(0,0,0,.08);background:#f7f2ec;flex:0 0 54px;}
    .album-name{font-size:1.05rem;font-weight:700;color:var(--dark);}
    .album-meta{font-size:.86rem;color:var(--mid);margin-top:2px;}
    .album-actions{margin-left:auto;display:flex;gap:10px;}
    .album-view{background:#10b981;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:.92rem;cursor:pointer;}
    .album-view:hover{background:#059669;}
    .album-delete{background:#ef4444;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:.92rem;cursor:pointer;}
    .album-delete:hover{background:#b91c1c;}
    .photo-panel{padding:14px 24px 0;}
    .photo-title{font-weight:700;color:var(--mid);margin-bottom:10px;}
    .photo-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
    .photo-thumb{width:100%;height:140px;object-fit:cover;border-radius:10px;border:1px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .notice{display:none;margin:14px 24px 0;padding:10px 12px;border-radius:10px;border:1px solid rgba(0,0,0,.08);}
    .notice.error{background:#fee2e2;border-color:#fecaca;color:#991b1b;}
    .notice.success{background:#dcfce7;border-color:#bbf7d0;color:#166534;}

    /* --- MOBILE FRIENDLY PATCH --- */
    @media (max-width: 1000px) {
      .main{margin-left:0;padding:18px 6vw;}
      .card{max-width:100vw;}
    }
    @media (max-width: 700px) {
      .main{padding:8px 2vw;}
      .card{padding:12px 0 8px;}
      .top{margin-bottom:14px;}
      .title{font-size:1.45rem;}
      .toolbar{padding:12px 12px 10px;font-size:1rem;}
      .form{padding:0 10px;flex-direction:column;align-items:stretch;gap:10px;display:flex;}
      .form .btn.primary{width:100%;}
      .album-list{gap:12px;margin-top:14px;padding:0 10px;}
      .album-item{padding:10px;gap:10px;display:grid;grid-template-columns:52px 1fr;align-items:center;}
      .album-cover{width:52px;height:52px;grid-row:1 / span 2;}
      .album-name{font-size:.98rem;padding:7px 9px;width:100%;}
      .album-actions{grid-column:1 / -1;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
      .album-view,.album-delete{padding:8px 10px;font-size:.84rem;width:100%;}
      .empty{padding:18px 10px;font-size:.95rem;}
    }
    @media (max-width: 420px) {
      .main{padding:6px 2vw;}
      .title{font-size:1.25rem;}
      .album-item{grid-template-columns:44px 1fr;padding:8px;}
      .album-cover{width:44px;height:44px;}
      .album-name{font-size:.92rem;}
    }
  </style>
</head>
<body>
  <main class="main">
    <div class="top">
      <h1 class="title">Manage Albums</h1>
    </div>

    <section class="card">
      <div class="toolbar">
        <span><i class="fas fa-folder-open"></i> Albums</span>
      </div>

      <div id="notice" class="notice"></div>

      <form class="form" id="albumForm">
        <input class="input" type="text" id="albumName" placeholder="Album name (e.g. Wedding, Birthday...)" required />
        <input class="input" type="file" id="albumCover" accept="image/*" required />
        <input class="input" type="file" id="albumPhotos" accept="image/*" multiple required webkitdirectory directory />
        <button type="submit" class="btn primary"><i class="fas fa-folder-plus"></i> Save Album</button>
      </form>

      <div class="upload-progress" id="uploadProgress" aria-live="polite" aria-atomic="true">
        <div class="upload-progress-head">
          <span id="uploadProgressText">Uploading... 0%</span>
          <strong id="uploadProgressPercent">0%</strong>
        </div>
        <div class="upload-progress-track">
          <div class="upload-progress-fill" id="uploadProgressFill"></div>
        </div>
      </div>

      <div class="help">Tip: Add album name + one profile photo, then select a folder to upload all images inside it (works best in Chrome / Edge).</div>

      <div class="album-list" id="albumList"></div>

      <div class="photo-panel" id="photoPanel" style="display:none;">
        <div class="photo-title">Photos</div>
        <div id="photoList" class="photo-list"></div>
      </div>
    </section>
  </main>
  <script>
    function showNotice(type, message) {
      const box = document.getElementById('notice');
      box.className = 'notice ' + (type || '');
      box.textContent = message || '';
      box.style.display = message ? 'block' : 'none';
    }

    async function fetchAlbums() {
      const res = await fetch('../php/get_albums.php');
      const data = await res.json().catch(() => ({}));
      if (!data.success || !Array.isArray(data.albums)) return [];
      return data.albums;
    }
    async function renderAlbums() {
      const albums = await fetchAlbums();
      const list = document.getElementById('albumList');
      if (!albums.length) {
        list.innerHTML = '<div class="empty">No albums found.</div>';
        return;
      }
      list.innerHTML = albums.map(album => `
        <div class="album-item">
          <img class="album-cover" src="${album.cover_photo ? ('../uploads/' + album.cover_photo) : 'https://placehold.co/108x108/f7f2ec/c8956c?text=Album'}" alt="${album.name} cover" />
          <div>
            <div class="album-name">${album.name}</div>
            ${album.created_at ? `<div class="album-meta">Created: ${new Date(album.created_at).toLocaleString()}</div>` : ''}
          </div>
          <div class="album-actions">
            <button type="button" class="album-view" data-id="${album.id}">View Photos</button>
            <button type="button" class="album-delete" data-id="${album.id}">Delete</button>
          </div>
        </div>
      `).join('');
    }
    function setUploadProgress(percent, text) {
      const p = Math.max(0, Math.min(100, Number(percent || 0)));
      const box = document.getElementById('uploadProgress');
      const fill = document.getElementById('uploadProgressFill');
      const headText = document.getElementById('uploadProgressText');
      const headPct = document.getElementById('uploadProgressPercent');
      if (box) box.classList.add('is-visible');
      if (fill) fill.style.width = p + '%';
      if (headPct) headPct.textContent = Math.round(p) + '%';
      if (headText) headText.textContent = (text || 'Uploading...') + ' ' + Math.round(p) + '%';
    }

    function hideUploadProgress() {
      const box = document.getElementById('uploadProgress');
      if (box) box.classList.remove('is-visible');
    }

    function uploadAlbumWithProgress(formData, onProgress) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '../php/add_album.php', true);

        xhr.upload.onprogress = (evt) => {
          if (typeof onProgress !== 'function') return;
          if (!evt.lengthComputable || !evt.total) {
            onProgress({ computable: false, percent: 0 });
            return;
          }
          const percent = (evt.loaded / evt.total) * 100;
          onProgress({ computable: true, percent });
        };

        xhr.onerror = () => reject(new Error('Network error during upload.'));

        xhr.onload = () => {
          let result = {};
          try {
            result = JSON.parse(xhr.responseText || '{}');
          } catch (err) {
            reject(new Error('Invalid server response'));
            return;
          }

          if (xhr.status < 200 || xhr.status >= 300 || !result.success) {
            reject(new Error(result.message || 'Failed to add album.'));
            return;
          }

          resolve(result);
        };

        xhr.send(formData);
      });
    }

    document.getElementById('albumForm').onsubmit = async function(e) {
      e.preventDefault();
      showNotice('', '');
      const form = this;
      const submitBtn = form.querySelector('button[type="submit"]');
      const name = document.getElementById('albumName').value.trim();
      const cover = document.getElementById('albumCover').files[0];
      const files = document.getElementById('albumPhotos').files;
      const maxAlbumPhotos = 500;
      if (!name || !cover || !files.length) return alert('Enter album name, choose profile photo, and select album photos');
      if (files.length > maxAlbumPhotos) {
        return alert(`Maximum ${maxAlbumPhotos} images allowed per album. You selected ${files.length}.`);
      }
      const formData = new FormData();
      formData.append('name', name);
      formData.append('profile_photo', cover);
      // Support folder upload: preserve relative paths
      for (let i = 0; i < files.length; i++) {
        // If webkitRelativePath is available, use it
        if (files[i].webkitRelativePath) {
          formData.append('photos[]', files[i], files[i].webkitRelativePath);
        } else {
          formData.append('photos[]', files[i]);
        }
      }
      form.querySelectorAll('input, button').forEach((el) => {
        el.disabled = true;
      });
      if (submitBtn) submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
      setUploadProgress(0, 'Uploading...');

      let hasRealProgress = false;
      let fakeProgress = 1;
      const fakeTimer = setInterval(() => {
        if (hasRealProgress) return;
        fakeProgress = Math.min(95, fakeProgress + (fakeProgress < 70 ? 3 : 1));
        setUploadProgress(fakeProgress, 'Uploading...');
      }, 450);

      try {
        const result = await uploadAlbumWithProgress(formData, (state) => {
          if (!state || !state.computable) return;
          hasRealProgress = true;
          const next = Math.max(fakeProgress, Number(state.percent || 0));
          setUploadProgress(next, 'Uploading...');
        });
        clearInterval(fakeTimer);
        setUploadProgress(100, 'Upload complete');
        document.getElementById('albumName').value = '';
        document.getElementById('albumCover').value = '';
        document.getElementById('albumPhotos').value = '';
        showNotice('success', `Album created. Uploaded ${result.uploaded_count || 0} photo(s).`);
        renderAlbums();
      } catch (error) {
        clearInterval(fakeTimer);
        showNotice('error', 'Error adding album: ' + error.message);
      } finally {
        clearInterval(fakeTimer);
        form.querySelectorAll('input, button').forEach((el) => {
          el.disabled = false;
        });
        if (submitBtn) submitBtn.innerHTML = '<i class="fas fa-folder-plus"></i> Save Album';
        setTimeout(hideUploadProgress, 1200);
      }
    };
    document.getElementById('albumList').addEventListener('click', async function(e) {
      if (e.target.classList.contains('album-view')) {
        const id = e.target.dataset.id;
        const res = await fetch('../php/get_album_photos.php?id=' + encodeURIComponent(id));
        const data = await res.json().catch(() => ({}));
        const photoPanel = document.getElementById('photoPanel');
        const photoList = document.getElementById('photoList');
        if (!data.success || !Array.isArray(data.photos)) {
          photoPanel.style.display = 'none';
          return;
        }
        photoPanel.style.display = 'block';
        photoList.innerHTML = data.photos.map(photo => `<img src="../uploads/${photo}" class="photo-thumb" alt="Photo" />`).join('');
      }
      if (e.target.classList.contains('album-delete')) {
        const id = e.target.dataset.id;
        if (!confirm('Delete this album and all its photos?')) return;
        await fetch('../php/delete_album.php', { method: 'POST', body: JSON.stringify({ id }) });
        renderAlbums();
        document.getElementById('photoPanel').style.display = 'none';
      }
    });
    renderAlbums();
  </script>
</body>
</html>
