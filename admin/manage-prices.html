<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Frame Prices – Asian 3D Frames Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../assets/css/admin-mobile.css?v=20260411"/>
  <script src="../assets/js/admin-auth.js" defer></script>
  <script src="../assets/js/admin-sidebar-unify.js?v=20260409" defer></script>
  <script src="../assets/js/admin-mobile.js?v=20260402" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --gold:#c8956c;--gold-light:#e8c09a;--gold-dark:#a0704a;
      --dark:#1a1510;--dark-2:#2e2620;--mid:#6b5c4e;
      --light:#faf7f4;--white:#fff;
      --green:#10b981;--red:#ef4444;
      --font-heading:'Bodoni Moda',serif;--font-body:'Bodoni Moda',serif;
      --sidebar-w:260px;--radius:12px;--radius-sm:8px;
      --shadow-sm:0 2px 12px rgba(0,0,0,.06);--shadow-md:0 8px 32px rgba(0,0,0,.10);
      --trans:.3s cubic-bezier(.4,0,.2,1);
    }
    html,body{height:100%;}
    body{font-family:var(--font-body);background:linear-gradient(135deg,#f3e8d8 0%,#e9f0d9 52%,#a8c68a 100%);color:var(--dark);display:flex;}
    a{text-decoration:none;color:inherit;}
    ul{list-style:none;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}
    img{max-width:100%;display:block;}

    /* ── SIDEBAR ── */
    .sidebar{
      width:var(--sidebar-w);
      background:linear-gradient(180deg,#d7a174 0%,#bc7f4d 100%);
      min-height:100vh;position:fixed;top:0;left:0;
      display:flex;flex-direction:column;padding:0 0 24px;z-index:100;
    }
    .sidebar-logo{
      padding:28px 24px;border-bottom:1px solid rgba(255,255,255,.08);
      font-family:var(--font-heading);font-size:1.4rem;font-weight:700;
      color:#fff;display:flex;align-items:center;gap:8px;
    }
    .sidebar-logo span{color:var(--gold-light);}
    .sidebar-nav{padding:20px 0;flex:1;}
    .nav-section-title{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:14px 24px 8px;}
    .nav-item a{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:.88rem;color:rgba(255,255,255,.65);border-left:3px solid transparent;transition:all var(--trans);}
    .nav-item a:hover,.nav-item a.active{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--gold);}
    .nav-item a i{width:18px;text-align:center;}
    .sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:.78rem;color:rgba(255,255,255,.4);}

    /* ── MAIN ── */
    .main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}
    .topbar{background:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm);}
    .topbar-title{font-family:var(--font-heading);font-size:1.35rem;color:var(--dark);}
    .admin-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
    .content{padding:32px;flex:1;}

    .card{background:#fff;border-radius:var(--radius);border:1px solid rgba(0,0,0,.06);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:24px;}
    .card-header{padding:18px 24px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;}
    .card-title{font-family:var(--font-heading);font-size:1.05rem;color:var(--dark);}
    .card-title i{color:var(--gold);}
    .card-body{padding:24px;}

    .form-group{margin-bottom:20px;}
    .form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--dark-2);margin-bottom:7px;letter-spacing:.02em;}
    .form-group select{
      width:100%;padding:11px 14px;
      border:1.5px solid rgba(0,0,0,.12);border-radius:var(--radius-sm);
      font-family:var(--font-body);font-size:.92rem;color:var(--dark);
      outline:none;transition:border-color var(--trans);background:#fff;
    }
    .form-group select:focus{border-color:var(--gold);}

    .price-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px;}
    .price-row{
      background:var(--light);padding:16px;border-radius:var(--radius-sm);
      border:1px solid rgba(0,0,0,.04);
    }
    .price-row-label{font-size:.85rem;font-weight:600;color:var(--dark);margin-bottom:8px;display:block;}
    .price-row input{
      width:100%;padding:10px 12px;
      border:1.5px solid rgba(0,0,0,.12);border-radius:var(--radius-sm);
      font-size:.9rem;color:var(--dark);
      outline:none;transition:border-color var(--trans);
    }
    .price-row input:focus{border-color:var(--gold);}

    .btn-save{
      background:linear-gradient(135deg,var(--gold),var(--gold-dark));
      color:#fff;padding:12px 24px;border-radius:var(--radius-sm);
      font-weight:600;cursor:pointer;transition:all var(--trans);margin-top:16px;
    }
    .btn-save:hover{opacity:.9;transform:translateY(-1px);}
    .btn-save:disabled{opacity:.6;cursor:not-allowed;transform:none;}

    .alert{padding:13px 16px;border-radius:var(--radius-sm);font-size:.88rem;margin-bottom:20px;display:none;}
    .alert.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#065f46;}
    .alert.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#991b1b;}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}

    .prices-container{display:none;}
    .prices-container.active{display:block;}

    @media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}}
  </style>
</head>
<body>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1 class="topbar-title"><i class="fas fa-dollar-sign" style="color:var(--gold);margin-right:8px;"></i>Manage Frame Prices</h1>
      <div class="admin-avatar">A</div>
    </div>

    <div class="content">
      <div id="alertBox" class="alert"></div>

      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-globe"></i> Global Frame Prices</span>
        </div>
        <div class="card-body">
          <p style="color:var(--mid);font-size:.92rem;line-height:1.6;">
            Prices saved here apply to all categories and products.
          </p>
        </div>
      </div>

      <div id="pricesContainer" class="prices-container">
        <!-- Mobile Prices Section -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-mobile-alt"></i> Mobile Frame Prices</span>
          </div>
          <div class="card-body">
            <div id="mobilePricesGrid" class="price-grid"></div>
          </div>
        </div>

        <!-- Normal Prices Section -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-image"></i> Normal Frame Prices</span>
          </div>
          <div class="card-body">
            <div id="normalPricesGrid" class="price-grid"></div>
          </div>
        </div>

        <button type="button" class="btn-save" id="saveBtn" onclick="savePrices()">
          <i class="fas fa-save"></i> Save All Prices
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/script.js"></script>
  <script>
    const mobileSizes = ["A1", "A2", "A3", "A4", "2 FEET X 4 FEET"];
    const normalSizes = ["A1", "A2", "A3", "A4", "2 FEET X 4 FEET", "4 FEET X 4 FEET", "4 FEET X 6 FEET", "4 FEET X 8 FEET", "CUSTOMISED SIZE"];

    document.addEventListener('DOMContentLoaded', async function() {
      await loadGlobalPrices();
    });

    async function loadGlobalPrices() {
      const categoryId = 0;

      try {
        const response = await fetch(`../php/get_category_prices.php?category_id=${categoryId}`);
        const data = await response.json();
        
        renderPriceFields(data.prices || {});
        document.getElementById('pricesContainer').classList.add('active');
      } catch (error) {
        console.error('Error loading prices:', error);
        showAlert('Error loading prices', 'error');
      }
    }

    function renderPriceFields(pricesData) {
      const mobilePricesGrid = document.getElementById('mobilePricesGrid');
      const normalPricesGrid = document.getElementById('normalPricesGrid');
      
      mobilePricesGrid.innerHTML = '';
      normalPricesGrid.innerHTML = '';

      // Mobile prices
      mobileSizes.forEach(size => {
        const row = document.createElement('div');
        row.className = 'price-row';
        
        const label = document.createElement('label');
        label.className = 'price-row-label';
        label.textContent = size;
        
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'price-input';
        input.dataset.type = 'mobile';
        input.dataset.size = size;
        input.placeholder = 'e.g. 199';
        input.min = '0';
        input.step = '0.01';
        input.value = pricesData[`mobile_${size}`] || '';
        
        row.appendChild(label);
        row.appendChild(input);
        mobilePricesGrid.appendChild(row);
      });

      // Normal prices
      normalSizes.forEach(size => {
        const row = document.createElement('div');
        row.className = 'price-row';
        
        const label = document.createElement('label');
        label.className = 'price-row-label';
        label.textContent = size;
        
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'price-input';
        input.dataset.type = 'normal';
        input.dataset.size = size;
        input.placeholder = 'e.g. 199';
        input.min = '0';
        input.step = '0.01';
        input.value = pricesData[`normal_${size}`] || '';
        
        row.appendChild(label);
        row.appendChild(input);
        normalPricesGrid.appendChild(row);
      });
    }

    async function savePrices() {
      const categoryId = 0;

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      
      // Collect all prices
      const priceInputs = document.querySelectorAll('.price-input');
      const prices = {};
      
      priceInputs.forEach(input => {
        const key = `${input.dataset.type}_${input.dataset.size}`;
        prices[key] = parseFloat(input.value) || 0;
      });

      try {
        const response = await fetch('../php/save_category_prices.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            category_id: categoryId,
            prices: prices
          })
        });

        const data = await response.json();
        
        if (data.success) {
          showAlert('Prices saved successfully!', 'success');
        } else {
          showAlert(data.message || 'Error saving prices', 'error');
        }
      } catch (error) {
        console.error('Error saving prices:', error);
        showAlert('Error saving prices', 'error');
      } finally {
        saveBtn.disabled = false;
      }
    }

    function showAlert(message, type) {
      const alertBox = document.getElementById('alertBox');
      alertBox.textContent = message;
      alertBox.className = `alert ${type}`;
      alertBox.style.display = 'block';
      
      if (type === 'success') {
        setTimeout(() => {
          alertBox.style.display = 'none';
        }, 3000);
      }
    }
  </script>
</body>
</html>
