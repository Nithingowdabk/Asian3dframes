<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Products - Asian3DFrames Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-two-page.css" />
  <script src="../js/admin-two-page.js"></script>
  <link rel="stylesheet" href="../css/admin-mobile.css" />
  <script src="../js/admin-auth.js" defer></script>
  <script src="../js/admin-mobile.js" defer></script>
  <style>
    :root { --gold:#c8956c; --gold-dark:#a0704a; --dark:#1a1510; --mid:#6b5c4e; --light:#faf7f4; --radius:12px; --shadow:0 8px 28px rgba(0,0,0,.08); --sidebar:260px; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Bodoni Moda',serif;background:linear-gradient(135deg,#f3e8d8 0%,#e9f0d9 52%,#a8c68a 100%);color:var(--dark);display:flex;}
    .sidebar{width:var(--sidebar);background:linear-gradient(180deg,#d7a174,#bc7f4d);min-height:100vh;position:fixed;left:0;top:0;color:#fff;}
    .logo{padding:26px 22px;border-bottom:1px solid rgba(255,255,255,.08);font-family:'Bodoni Moda',serif;font-size:1.35rem;font-weight:700;}
    .logo span{color:#e8c09a;}
    .nav{padding:16px 0;}
    .nav a{display:flex;gap:10px;align-items:center;padding:12px 22px;color:rgba(255,255,255,.7);text-decoration:none;border-left:3px solid transparent;}
    .nav a.active,.nav a:hover{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--gold);}
    .main{margin-left:var(--sidebar);flex:1;padding:24px 28px;}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .title{font-family:'Bodoni Moda',serif;font-size:1.8rem;}
    .btn{border:none;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer;}
    .btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;}
    .btn.small{padding:7px 10px;font-size:.8rem;}
    .btn.ghost{background:#fff;border:1px solid rgba(0,0,0,.14);}
    .card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:16px;border-bottom:1px solid rgba(0,0,0,.06);}
    .search{padding:9px 12px;border:1px solid rgba(0,0,0,.14);border-radius:10px;min-width:240px;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:12px 14px;border-bottom:1px solid rgba(0,0,0,.06);text-align:left;font-size:.88rem;}
    th{background:#faf7f4;font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);}
    .thumb{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1px solid rgba(0,0,0,.07);}
    .actions{display:flex;gap:8px;}
    .empty{padding:38px;text-align:center;color:var(--mid);}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:999;padding:16px;}
    .modal.open{display:flex;}
    .modal-card{background:#fff;border-radius:14px;max-width:620px;width:100%;padding:22px;}
    .modal-card h3{margin-bottom:14px;font-family:'Bodoni Moda',serif;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .group{margin-bottom:10px;}
    .group label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--mid);font-weight:600;}
    .group input,.group textarea,.group select{width:100%;border:1px solid rgba(0,0,0,.13);border-radius:10px;padding:9px 11px;font-family:inherit;}
    .group textarea{min-height:90px;resize:vertical;}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;}
    .msg{display:none;margin-bottom:10px;padding:9px 12px;border-radius:8px;font-size:.86rem;}
    .msg.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
    .msg.err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}
    .image-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;margin-top:10px;}
    .image-preview-item{aspect-ratio:3/4;border-radius:10px;overflow:hidden;border:1px solid rgba(0,0,0,.08);background:#faf7f4;}
    .image-preview-item img{width:100%;height:100%;object-fit:cover;display:block;}
    .image-preview-empty{margin-top:10px;color:var(--mid);font-size:.82rem;}
    .pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;}
    .pill.best{background:rgba(200,149,108,.2);color:var(--gold-dark);border:1px solid rgba(200,149,108,.5);}
    .checkline{display:flex;align-items:center;gap:8px;margin-top:8px;}
    .checkline input{width:16px;height:16px;accent-color:var(--gold-dark);}
    .checkline label{font-size:.84rem;color:var(--dark);font-weight:600;}
    @media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><img src="/uploads/Asian3DFrames_logo.png" alt="Asian3DFrames logo" class="brand-logo-img" style="height:78px;width:auto;display:block;" /></div>
    <nav class="nav">
      <a href="../../admin/dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="../../admin/dashboard.html?view=orders"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="../../admin/dashboard.html?view=add"><i class="fas fa-plus-circle"></i> Add Product</a>
      <a href="../../admin/dashboard.html?view=products" class="active"><i class="fas fa-box"></i> Manage Products</a>
      <a href="../../admin/dashboard.html?view=albums"><i class="fas fa-folder-open"></i> Manage Albums</a>
      <a href="../../admin/dashboard.html?view=categories"><i class="fas fa-tags"></i> Manage Categories</a>
      <a href="../../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
    </nav>
  </aside>

  <main class="main">
    <div class="top">
      <h1 class="title">Manage Products</h1>
      <a class="btn primary" href="../../admin/dashboard.html?view=add"><i class="fas fa-plus"></i> Add New Product</a>
    </div>

    <div id="msg" class="msg"></div>

    <section class="card">
      <div class="toolbar">
        <strong id="countLabel">0 products</strong>
        <input id="search" class="search" type="search" placeholder="Search by product name..." />
      </div>
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Best Seller</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div id="empty" class="empty" style="display:none;">No products found.</div>
    </section>
  </main>

  <div id="editModal" class="modal">
    <div class="modal-card">
      <h3>Edit Product</h3>
      <form id="editForm">
        <input type="hidden" id="eId" />
        <div class="grid">
          <div class="group">
            <label for="eName">Name</label>
            <input id="eName" required />
          </div>
          <div class="group">
            <label for="eCategory">Category</label>
            <select id="eCategory" required>
              <option value="mobile">Mobile Photo Frame</option>
              <option value="normal">Normal Photo Frame</option>
            </select>
          </div>
        </div>
        <div class="grid">
          <div class="group">
            <label for="ePrice">Price</label>
            <input id="ePrice" type="number" min="1" step="0.01" required />
          </div>
          <div class="group">
            <label for="eOldPrice">Old Price</label>
            <input id="eOldPrice" type="number" min="0" step="0.01" />
          </div>
        </div>
        <div class="grid">
          <div class="group">
            <label for="eStock">Stock</label>
            <input id="eStock" type="number" min="0" required />
            <div class="checkline">
              <input id="eBestSeller" type="checkbox" />
              <label for="eBestSeller">Best Seller</label>
            </div>
          </div>
          <div class="group">
            <label for="eImages">Image Paths</label>
            <textarea id="eImages" placeholder="One image path per line"></textarea>
          </div>
        </div>
        <div class="group">
          <label>Image Preview</label>
          <div id="eImagesPreview" class="image-preview-grid"></div>
          <div id="eImagesPreviewEmpty" class="image-preview-empty">No images added.</div>
        </div>
        <div class="group">
          <label for="eDesc">Description</label>
          <textarea id="eDesc" required></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" type="button" id="closeModal">Cancel</button>
          <button class="btn primary" type="submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const rows = document.getElementById('rows');
    const countLabel = document.getElementById('countLabel');
    const searchInput = document.getElementById('search');
    const empty = document.getElementById('empty');
    const msg = document.getElementById('msg');

    const modal = document.getElementById('editModal');
    const editForm = document.getElementById('editForm');

    let products = [];
    let categories = [];

    const getCategoryName = (id) => {
      const cat = categories.find(c => c.id == id);
      return cat ? cat.name : 'Uncategorized';
    };

    const getLegacyCategoryName = (value) => {
      const raw = String(value || '').trim().toLowerCase();
      if (raw === 'mobile') return 'Mobile Photo Frame';
      if (raw === 'normal') return 'Normal Photo Frame';
      return String(value || '').trim();
    };

    const getProductCategoryText = (p) => {
      const name = String(p?.category_name || '').trim();
      if (name) return name;
      const cid = Number(p?.category_id || 0);
      if (cid > 0) return getCategoryName(cid);
      const legacy = getLegacyCategoryName(p?.category);
      return legacy || 'Uncategorized';
    };

    const normalizeImages = (product) => {
      if (Array.isArray(product?.images)) {
        return product.images.map((item) => String(item || '').trim()).filter(Boolean);
      }

      const raw = String(product?.image || '').trim();
      if (!raw) return [];

      if (raw.startsWith('[')) {
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            return parsed.map((item) => String(item || '').trim()).filter(Boolean);
          }
        } catch (_err) {}
      }

      return [raw];
    };

    const showMsg = (text, ok = true) => {
      msg.className = `msg ${ok ? 'ok' : 'err'}`;
      msg.textContent = text;
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 2600);
    };

    const esc = (s) => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');

    function renderImagePreviews(images) {
      const preview = document.getElementById('eImagesPreview');
      const emptyState = document.getElementById('eImagesPreviewEmpty');
      if (!preview || !emptyState) return;

      const list = Array.isArray(images) ? images : [];
      preview.innerHTML = list.map((path, index) => `
        <div class="image-preview-item">
          <img src="../${esc(path)}" alt="Product image ${index + 1}" onerror="this.closest('.image-preview-item').remove();" />
        </div>
      `).join('');
      emptyState.style.display = preview.children.length ? 'none' : 'block';
    }

    function parseImageInput(value) {
      return String(value || '')
        .split(/\r?\n|,/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    async function loadCategories() {
      try {
        const res = await fetch('../../php/get_categories.php');
        const data = await res.json();
        if (data.success) {
          categories = data.categories;
          const select = document.getElementById('eCategory');
          select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }
      } catch (err) {
        console.error('Failed to load categories', err);
      }
    }

    async function loadProducts() {
      const res = await fetch('../../php/get_products.php');
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'Failed to load products');
      products = data.products || [];
      render();
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const list = products.filter((p) => p.name.toLowerCase().includes(q));
      countLabel.textContent = `${list.length} products`;
      empty.style.display = list.length ? 'none' : 'block';
      rows.innerHTML = list.map((p) => `
        <tr>
          <td><img class="thumb" src="../${esc(p.image)}" alt="${esc(p.name)}" onerror="this.src='https://placehold.co/54x54/f2f2f2/9b9b9b?text=Img';" /></td>
          <td>${esc(p.name)}</td>
          <td>${esc(getProductCategoryText(p))}</td>
          <td>${p.is_best_seller ? '<span class="pill best">Best Seller</span>' : '-'}</td>
          <td>${Number(p.price).toFixed(0)} INR</td>
          <td>${Number(p.stock)}</td>
          <td>
            <div class="actions">
              <button class="btn small ghost" type="button" data-action="edit" data-id="${Number(p.id)}">Edit</button>
              <button class="btn small" type="button" style="background:#ef4444;color:#fff;" data-action="delete" data-id="${Number(p.id)}">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openEdit(p) {
      document.getElementById('eId').value = p.id;
      document.getElementById('eName').value = p.name;
      const select = document.getElementById('eCategory');
      const cid = Number(p.category_id || 0);
      if (cid > 0) {
        select.value = String(cid);
      } else {
        const legacyName = String(p.category_name || '').trim() || getLegacyCategoryName(p.category);
        const match = categories.find((c) => String(c.name || '').trim().toLowerCase() === String(legacyName || '').trim().toLowerCase());
        select.value = match ? String(match.id) : '';
      }
      document.getElementById('ePrice').value = p.price;
      document.getElementById('eOldPrice').value = p.old_price || '';
      document.getElementById('eStock').value = p.stock;
      document.getElementById('eBestSeller').checked = Boolean(p.is_best_seller);
      const images = normalizeImages(p);
      document.getElementById('eImages').value = images.join('\n');
      document.getElementById('eDesc').value = p.description || '';
      renderImagePreviews(images);
      modal.classList.add('open');
    }

    document.getElementById('eImages').addEventListener('input', (e) => {
      renderImagePreviews(parseImageInput(e.target.value));
    });

    document.getElementById('closeModal').addEventListener('click', () => modal.classList.remove('open'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });

    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        id: Number(document.getElementById('eId').value),
        name: document.getElementById('eName').value.trim(),
        description: document.getElementById('eDesc').value.trim(),
        price: Number(document.getElementById('ePrice').value),
        old_price: document.getElementById('eOldPrice').value ? Number(document.getElementById('eOldPrice').value) : null,
        category_id: Number(document.getElementById('eCategory').value),
        stock: Number(document.getElementById('eStock').value),
        is_best_seller: document.getElementById('eBestSeller').checked ? 1 : 0,
        images: parseImageInput(document.getElementById('eImages').value),
      };

      const res = await fetch('../../php/admin_update_product.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.success) {
        showMsg(data.message || 'Failed to update product', false);
        return;
      }

      modal.classList.remove('open');
      showMsg('Product updated successfully.');
      await loadProducts();
    });

    async function deleteProduct(id) {
      if (!confirm('Delete this product permanently?')) return;
      const res = await fetch('../../php/admin_delete_product.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      const data = await res.json();
      if (!data.success) {
        showMsg(data.message || 'Failed to delete product', false);
        return;
      }
      showMsg('Product deleted successfully.');
      await loadProducts();
    }

    rows.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      if (!id) return;
      const action = btn.dataset.action;
      if (action === 'edit') {
        const product = products.find((p) => Number(p.id) === id);
        if (product) openEdit(product);
      }
      if (action === 'delete') {
        deleteProduct(id);
      }
    });

    searchInput.addEventListener('input', render);
    Promise.all([loadProducts(), loadCategories()]).catch((err) => showMsg(err.message || 'Failed to load page data', false));
  </script>
</body>
</html>
