<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orders – Asian 3D Frames Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/admin-two-page.css"/>
  <script src="../js/admin-two-page.js"></script>
  <link rel="stylesheet" href="../css/admin-mobile.css"/>
  <script src="../js/admin-auth.js" defer></script>
  <script src="../js/admin-mobile.js" defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --gold:#c8956c;--gold-light:#e8c09a;--gold-dark:#a0704a;
      --dark:#1a1510;--dark-2:#2e2620;--mid:#6b5c4e;
      --light:#faf7f4;--white:#fff;
      --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;
      --font-heading:'Bodoni Moda',serif;--font-body:'Bodoni Moda',serif;
      --sidebar-w:260px;--radius:12px;--radius-sm:8px;
      --shadow-sm:0 2px 12px rgba(0,0,0,.06);--shadow-md:0 8px 32px rgba(0,0,0,.10);
      --trans:.3s cubic-bezier(.4,0,.2,1);
    }
    html,body{height:100%;}
    body{font-family:var(--font-body);background:linear-gradient(135deg,#f3e8d8 0%,#e9f0d9 52%,#a8c68a 100%);color:var(--dark);display:flex;}
    a{text-decoration:none;color:inherit;}
    ul{list-style:none;}
    button{cursor:pointer;border:none;background:none;font-family:inherit;}

    /* SIDEBAR */
    .sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#d7a174 0%,#bc7f4d 100%);min-height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;padding:0 0 24px;z-index:100;}
    .sidebar-logo{padding:28px 24px;border-bottom:1px solid rgba(255,255,255,.08);font-family:var(--font-heading);font-size:1.4rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;}
    .sidebar-logo span{color:var(--gold-light);}
    .sidebar-nav{padding:20px 0;flex:1;}
    .nav-section-title{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:14px 24px 8px;}
    .nav-item a{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:.88rem;color:rgba(255,255,255,.65);border-left:3px solid transparent;transition:all var(--trans);}
    .nav-item a:hover,.nav-item a.active{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--gold);}
    .nav-item a i{width:18px;text-align:center;}
    .sidebar-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:.78rem;color:rgba(255,255,255,.4);}

    /* MAIN */
    .main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}
    .topbar{background:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm);}
    .topbar-left{display:flex;align-items:center;gap:16px;}
    .topbar-title{font-family:var(--font-heading);font-size:1.35rem;color:var(--dark);}
    .admin-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
    .content{padding:32px;flex:1;}

    /* FILTERS */
    .filters-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
    .filter-btn{padding:8px 18px;border-radius:50px;font-size:.82rem;font-weight:600;border:1.5px solid rgba(0,0,0,.12);color:var(--mid);transition:all var(--trans);background:#fff;}
    .filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold-dark);background:rgba(200,149,108,.08);}
    .search-box{margin-left:auto;position:relative;}
    .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mid);font-size:.85rem;}
    .search-box input{padding:9px 14px 9px 36px;border:1.5px solid rgba(0,0,0,.12);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.87rem;outline:none;min-width:220px;}
    .search-box input:focus{border-color:var(--gold);}

    /* TABLE */
    .table-card{background:#fff;border-radius:var(--radius);border:1px solid rgba(0,0,0,.06);box-shadow:var(--shadow-sm);overflow:hidden;}
    .table-header{padding:16px 24px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;}
    .table-title{font-weight:600;font-size:.92rem;color:var(--dark);}
    #totalCount{font-size:.8rem;color:var(--mid);}
    .orders-table{width:100%;border-collapse:collapse;}
    .orders-table thead th{background:#faf7f4;padding:12px 16px;text-align:left;font-size:.73rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);border-bottom:1px solid rgba(0,0,0,.06);}
    .orders-table tbody td{padding:14px 16px;border-bottom:1px solid rgba(0,0,0,.05);font-size:.87rem;vertical-align:middle;}
    .orders-table tbody tr:last-child td{border-bottom:none;}
    .orders-table tbody tr:hover td{background:#fdf9f6;}
    .order-id{font-weight:700;color:var(--dark);}
    .customer-name{font-weight:600;}
    .customer-city{font-size:.78rem;color:var(--mid);}

    /* Status badge */
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:.73rem;font-weight:700;letter-spacing:.04em;text-transform:capitalize;}
    .status-badge.pending   {background:rgba(245,158,11,.12);color:#b45309;}
    .status-badge.confirmed {background:rgba(59,130,246,.12);color:#1d4ed8;}
    .status-badge.shipped   {background:rgba(139,92,246,.12);color:#6d28d9;}
    .status-badge.delivered {background:rgba(16,185,129,.12);color:#065f46;}
    .status-badge.cancelled {background:rgba(239,68,68,.12); color:#991b1b;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

    /* Status select inline */
    .status-select{
      padding:5px 10px;border:1.5px solid rgba(0,0,0,.12);border-radius:var(--radius-sm);
      font-family:var(--font-body);font-size:.82rem;color:var(--dark);outline:none;cursor:pointer;
    }
    .status-select:focus{border-color:var(--gold);}

    /* Action btn */
    .btn-view{padding:6px 14px;border:1.5px solid rgba(0,0,0,.12);border-radius:var(--radius-sm);font-size:.78rem;font-weight:600;color:var(--dark-2);transition:all var(--trans);}
    .btn-view:hover{border-color:var(--gold);color:var(--gold-dark);}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:var(--radius);max-width:600px;width:100%;box-shadow:var(--shadow-md);overflow:hidden;max-height:90vh;overflow-y:auto;}
    .modal-header{padding:20px 24px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;}
    .modal-header h3{font-family:var(--font-heading);font-size:1.1rem;}
    .modal-close{color:var(--mid);font-size:1.2rem;padding:4px 8px;border-radius:6px;transition:all var(--trans);}
    .modal-close:hover{background:rgba(0,0,0,.06);}
    .modal-body{padding:24px;}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:.88rem;}
    .detail-row:last-child{border-bottom:none;}
    .detail-label{color:var(--mid);font-weight:500;}
    .detail-value{font-weight:600;color:var(--dark);text-align:right;}
    .items-table{width:100%;border-collapse:collapse;margin-top:16px;}
    .items-table th{background:#faf7f4;padding:10px 12px;text-align:left;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);}
    .items-table td{padding:10px 12px;border-top:1px solid rgba(0,0,0,.06);font-size:.85rem;}

    /* Loading / empty */
    .loading{padding:60px;text-align:center;color:var(--mid);}
    .loading i{font-size:2rem;color:var(--gold);animation:sp .7s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}
    .empty-state{padding:60px;text-align:center;color:var(--mid);}
    .empty-state i{font-size:2.5rem;margin-bottom:12px;display:block;color:var(--gold);}

    @media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}}
    @media(max-width:768px){.orders-table{display:block;overflow-x:auto;}}
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="/uploads/Asian3DFrames_logo.png" alt="Asian3DFrames logo" class="brand-logo-img" style="height:78px;width:auto;display:block;" /></div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Main</div>
      <li class="nav-item"><a href="../../admin/dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
      <li class="nav-item"><a href="../../admin/dashboard.html?view=orders" class="active"><i class="fas fa-shopping-bag"></i> Orders</a></li>
      <div class="nav-section-title">Products</div>
      <li class="nav-item"><a href="../../admin/dashboard.html?view=add"><i class="fas fa-plus-circle"></i> Add Product</a></li>
      <li class="nav-item"><a href="../../admin/dashboard.html?view=products"><i class="fas fa-box"></i> Manage Products</a></li>
      <li class="nav-item"><a href="../../admin/dashboard.html?view=albums"><i class="fas fa-folder-open"></i> Manage Albums</a></li>
      <li class="nav-item"><a href="../../admin/dashboard.html?view=categories"><i class="fas fa-tags"></i> Manage Categories</a></li>
      <div class="nav-section-title">Site</div>
      <li class="nav-item"><a href="../../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a></li>
    </nav>
    <div class="sidebar-footer">Asian 3D Frames  Admin &copy; 2026</div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1 class="topbar-title"><i class="fas fa-shopping-bag" style="color:var(--gold);margin-right:8px;"></i>Orders</h1>
        <span id="totalCount"></span>
      </div>
      <div class="admin-avatar">A</div>
    </div>

    <div class="content">
      <!-- Filters row -->
      <div class="filters-row">
        <button class="filter-btn active" data-status="all" onclick="setFilter(this)">All</button>
        <button class="filter-btn" data-status="pending"   onclick="setFilter(this)">Pending</button>
        <button class="filter-btn" data-status="confirmed" onclick="setFilter(this)">Confirmed</button>
        <button class="filter-btn" data-status="shipped"   onclick="setFilter(this)">Shipped</button>
        <button class="filter-btn" data-status="delivered" onclick="setFilter(this)">Delivered</button>
        <button class="filter-btn" data-status="cancelled" onclick="setFilter(this)">Cancelled</button>
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search by name / order ID…" oninput="renderTable()"/>
        </div>
      </div>

      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Order Management</span>
          <button onclick="loadOrders()" title="Refresh" style="color:var(--mid);font-size:.9rem;"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div id="tableWrap">
          <div class="loading"><i class="fas fa-spinner"></i></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Order Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalBox">
      <div class="modal-header">
        <h3 id="modalTitle">Order #</h3>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    let allOrders = [];
    let currentFilter = 'all';

    /* ── Load orders from PHP ── */
    async function loadOrders() {
      document.getElementById('tableWrap').innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';
      try {
        const res  = await fetch('../../php/admin_get_orders.php');
        const data = await res.json();
        if (data.success) {
          allOrders = data.orders;
          renderTable();
        } else {
          document.getElementById('tableWrap').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${data.message}</p></div>`;
        }
      } catch {
        document.getElementById('tableWrap').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load orders. Check PHP connection.</p></div>';
      }
    }

    function setFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.status;
      renderTable();
    }

    function renderTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();

      let filtered = allOrders.filter(o => {
        if (currentFilter !== 'all' && o.status !== currentFilter) return false;
        if (q && !`${o.id} ${o.first_name} ${o.last_name} ${o.city}`.toLowerCase().includes(q)) return false;
        return true;
      });

      document.getElementById('totalCount').textContent = `${filtered.length} ${filtered.length === 1 ? 'order' : 'orders'}`;

      if (filtered.length === 0) {
        document.getElementById('tableWrap').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No orders found.</p></div>';
        return;
      }

      const rows = filtered.map(o => `
        <tr>
          <td class="order-id">#${o.id}</td>
          <td>
            <div class="customer-name">${esc(o.first_name)} ${esc(o.last_name)}</div>
            <div class="customer-city">${esc(o.city)} · ${esc(o.phone)}</div>
          </td>
          <td>${esc(o.payment_method)}</td>
          <td style="font-weight:700;">${parseFloat(o.total).toFixed(0)} INR</td>
          <td>
            <span class="status-badge ${o.status}">
              <span class="status-dot"></span>${o.status}
            </span>
          </td>
          <td>
            <select class="status-select" onchange="updateStatus(${o.id}, this.value, this)" data-original="${o.status}">
              <option value="pending"   ${o.status==='pending'  ?'selected':''}>Pending</option>
              <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
              <option value="shipped"   ${o.status==='shipped'  ?'selected':''}>Shipped</option>
              <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
              <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
            </select>
          </td>
          <td>${formatDate(o.created_at)}</td>
          <td><button class="btn-view" onclick='viewOrder(${JSON.stringify(o)})'>View</button></td>
        </tr>
      `).join('');

      document.getElementById('tableWrap').innerHTML = `
        <table class="orders-table">
          <thead>
            <tr>
              <th>ID</th><th>Customer</th><th>Payment</th>
              <th>Total</th><th>Status</th><th>Update Status</th>
              <th>Date</th><th>Action</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    /* ── Update order status ── */
    async function updateStatus(orderId, newStatus, selectEl) {
      const original = selectEl.dataset.original;
      try {
        const res  = await fetch('../../php/admin_update_order.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId, status: newStatus }),
        });
        const data = await res.json();
        if (data.success) {
          selectEl.dataset.original = newStatus;
          const order = allOrders.find(o => o.id == orderId);
          if (order) order.status = newStatus;
          /* Re-render just the status badge in same row */
          const badge = selectEl.closest('tr').querySelector('.status-badge');
          if (badge) { badge.className = `status-badge ${newStatus}`; badge.innerHTML = `<span class="status-dot"></span>${newStatus}`; }
        } else {
          alert('Error: ' + data.message);
          selectEl.value = original;
        }
      } catch {
        alert('Network error. Could not update status.');
        selectEl.value = original;
      }
    }

    /* ── View order detail ── */
    function viewOrder(o) {
      document.getElementById('modalTitle').textContent = `Order #${o.id}`;
      let itemsHtml = '';
      if (o.items && o.items.length) {
        itemsHtml = `
          <table class="items-table">
            <thead><tr><th>Product</th><th>Photo</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
            <tbody>
              ${o.items.map(i => `
                <tr>
                  <td>${esc(i.product_name || i.name || 'Item')}</td>
                  <td>
                    ${(() => {
                      const photoUrl = getItemPhotoUrl(i);
                      if (!photoUrl) return '<span style="color:var(--mid);font-size:.78rem;">—</span>';
                      const photoKind = i.custom_photo
                        ? 'Custom'
                        : (i.photo ? 'Order' : 'Product');
                      return `
                        <div style="display:flex;align-items:center;gap:8px;">
                          <a href="${esc(photoUrl)}" target="_blank" title="Open uploaded photo">
                            <img src="${esc(photoUrl)}" alt="Uploaded photo" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid rgba(0,0,0,.12);"/>
                          </a>
                          <div style="display:flex;flex-direction:column;gap:2px;">
                            <span style="font-size:.68rem;color:var(--mid);font-weight:600;">${photoKind}</span>
                            <a href="${esc(photoUrl)}" download style="font-size:.78rem;font-weight:600;color:var(--gold-dark);">Download</a>
                          </div>
                        </div>
                      `;
                    })()}
                  </td>
                  <td>${i.quantity}</td>
                  <td>${parseFloat(i.price).toFixed(0)} INR</td>
                  <td>${(i.quantity * i.price).toFixed(0)} INR</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      }
      document.getElementById('modalBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">Customer</span><span class="detail-value">${esc(o.first_name)} ${esc(o.last_name)}</span></div>
        <div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${esc(o.phone)}</span></div>
        <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${esc(o.email||'—')}</span></div>
        <div class="detail-row"><span class="detail-label">Address</span><span class="detail-value">${formatAddressForAdmin(o)}</span></div>
        <div class="detail-row"><span class="detail-label">Payment</span><span class="detail-value">${esc(o.payment_method)}</span></div>
        <div class="detail-row"><span class="detail-label">Total</span><span class="detail-value" style="color:var(--gold-dark);font-size:1.05rem;">${parseFloat(o.total).toFixed(0)} INR</span></div>
        <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="status-badge ${o.status}"><span class="status-dot"></span>${o.status}</span></span></div>
        <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${formatDate(o.created_at)}</span></div>
        ${o.notes ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value">${esc(o.notes)}</span></div>` : ''}
        ${itemsHtml ? `<h4 style="font-family:var(--font-heading);margin:20px 0 4px;">Ordered Items</h4>${itemsHtml}` : ''}
      `;
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    /* ── Helpers ── */
    function esc(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
    }

    function formatAddressForAdmin(o) {
      const shippingAddress = String(o?.shipping_address || o?.address || '').trim();
      const district = String(o?.district || '').trim();
      const city = String(o?.city || '').trim();
      const state = String(o?.state || '').trim();
      const pincode = String(o?.pincode || '').trim();

      const parts = [];
      if (district) parts.push(district);
      if (city) parts.push(city);
      if (state) parts.push(state);
      if (pincode) parts.push(pincode);

      const primary = shippingAddress || String(o?.address || '').trim() || '—';
      if (!parts.length) {
        return esc(primary);
      }
      return `${esc(primary)}<br><span style="font-size:.8rem;color:var(--mid);">${esc(parts.join(', '))}</span>`;
    }

    function getItemPhotoUrl(item) {
      const direct = getPhotoUrl(item?.custom_photo) || getPhotoUrl(item?.photo);
      if (direct) return direct;

      const rawImage = item?.image;
      if (Array.isArray(rawImage) && rawImage.length) {
        return getPhotoUrl(rawImage[0]);
      }

      const imageStr = String(rawImage || '').trim();
      if (!imageStr) return '';

      // Products table often stores images as JSON array strings.
      if ((imageStr.startsWith('[') && imageStr.endsWith(']')) || (imageStr.startsWith('"') && imageStr.endsWith('"'))) {
        try {
          const parsed = JSON.parse(imageStr);
          if (Array.isArray(parsed) && parsed.length) {
            return getPhotoUrl(parsed[0]);
          }
          if (typeof parsed === 'string') {
            return getPhotoUrl(parsed);
          }
        } catch (_) {
          // Fall through and try raw string path normalization.
        }
      }

      return getPhotoUrl(imageStr);
    }

    function getPhotoUrl(path) {
      const p = String(path || '').trim();
      if (!p) return '';
      if (/^data:image\//i.test(p)) return p;
      if (/^https?:\/\//i.test(p)) return p;

      let normalized = p.replace(/\\/g, '/');
      normalized = normalized.replace(/^\.\//, '');

      // Convert absolute local file paths to project-relative web paths.
      normalized = normalized.replace(/^([A-Za-z]:\/)?xampp\/htdocs\/gift4you\//i, '');
      normalized = normalized.replace(/^([A-Za-z]:\/)?[^/]*gift4you\//i, '');
      // Album photo API returns albums/<album>/<file>; actual web path is uploads/albums/...
      if (/^albums\//i.test(normalized)) {
        normalized = `uploads/${normalized}`;
      }

      normalized = normalized.replace(/^\/+/, '');
      if (!normalized) return '';
      if (normalized.startsWith('../')) return normalized;
      return `../${normalized}`;
    }

    /* ── Init ── */
    loadOrders();
  </script>
</body>
