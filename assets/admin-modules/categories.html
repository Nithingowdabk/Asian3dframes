<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Categories - Gift4You Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-two-page.css" />
  <script src="../js/admin-two-page.js"></script>
  <link rel="stylesheet" href="../css/admin-mobile.css" />
  <script src="../js/admin-auth.js" defer></script>
  <script src="../js/admin-mobile.js" defer></script>
  <style>
    :root { --gold:#c8956c; --gold-dark:#a0704a; --dark:#1a1510; --mid:#6b5c4e; --light:#faf7f4; --radius:14px; --sidebar:260px; --shadow:0 8px 28px rgba(0,0,0,.08); }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f1ece8;color:var(--dark);display:flex;}
    .sidebar{width:var(--sidebar);background:linear-gradient(180deg,#1a1510,#2b2015);min-height:100vh;position:fixed;left:0;top:0;color:#fff;}
    .logo{padding:26px 22px;border-bottom:1px solid rgba(255,255,255,.08);font-family:'Playfair Display',sans-serif;font-size:1.35rem;font-weight:700;}
    .logo span{color:#e8c09a;}
    .nav{padding:16px 0;}
    .nav a{display:flex;gap:10px;align-items:center;padding:12px 22px;color:rgba(255,255,255,.7);text-decoration:none;border-left:3px solid transparent;transition:background .2s, color .2s;}
    .nav a.active,.nav a:hover{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--gold);}
    .main{margin-left:var(--sidebar);flex:1;padding:32px 36px;min-height:100vh;background:linear-gradient(180deg,#f1ece8 60%,#faf7f4 100%);}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
    .title{font-family:'Playfair Display',sans-serif;font-size:2.1rem;letter-spacing:.02em;}
    .btn{border:none;border-radius:10px;padding:10px 18px;font-weight:600;cursor:pointer;transition:background .2s, color .2s, box-shadow .2s;}
    .btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;box-shadow:0 2px 8px rgba(200,149,108,.12);}
    .btn.primary:hover{background:linear-gradient(135deg,#a0704a,#c8956c);}
    .btn.small{padding:7px 10px;font-size:.8rem;}
    .btn.ghost{background:#fff;border:1px solid rgba(0,0,0,.14);}
    .btn.ghost:hover{background:#f8f8f8;}
    .card{background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;padding:24px 0 18px;max-width:700px;margin:0 auto;}
    .toolbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:18px 24px 12px;border-bottom:1px solid rgba(0,0,0,.06);font-size:1.15rem;font-weight:600;color:var(--mid);background:#faf7f4;}
    .empty{padding:38px;text-align:center;color:var(--mid);font-size:1.1rem;}
    .category-list{display:grid;gap:18px;margin-top:24px;}
    .category-item{display:flex;align-items:center;gap:18px;background:#fff;border-radius:12px;padding:14px 18px;box-shadow:0 2px 8px rgba(200,149,108,.08);transition:box-shadow .2s;}
    .category-item:hover{box-shadow:0 4px 16px rgba(200,149,108,.16);}
    .category-img{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1.5px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,.07);}
    .category-name{flex:1;font-size:1.13rem;font-weight:600;padding:7px 12px;border-radius:7px;border:1px solid #eee;background:#faf7f4;transition:border-color .2s;}
    .category-name:focus{border-color:var(--gold);outline:none;}
    .category-actions{display:flex;gap:10px;}
    .category-edit{background:#10b981;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:.92rem;box-shadow:0 1px 4px rgba(16,185,129,.08);transition:background .2s;}
    .category-edit:hover{background:#059669;}
    .category-delete{background:#ef4444;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:.92rem;box-shadow:0 1px 4px rgba(239,68,68,.08);transition:background .2s;}
    .category-delete:hover{background:#b91c1c;}
    .add-category-form{display:flex;gap:14px;align-items:center;margin-top:24px;padding:0 24px;}
    .add-category-form input[type="text"]{flex:1;font-size:1rem;padding:10px 14px;border-radius:7px;border:1.5px solid #eee;background:#faf7f4;transition:border-color .2s;}
    .add-category-form input[type="text"]:focus{border-color:var(--gold);outline:none;}
    .add-category-form input[type="file"]{flex:1;}
    .add-category-form button{width:auto;padding:10px 22px;}
    @media (max-width: 900px) {
      .main{margin-left:0;padding:18px 6vw;}
      .card{max-width:100vw;}
    }
    @media (max-width: 600px) {
      .main{padding:8px 2vw;}
      .card{padding:12px 0 8px;}
      .add-category-form{padding:0 8px;flex-direction:column;align-items:stretch;}
      .category-item{padding:8px 6px;gap:8px;}
      .category-img{width:44px;height:44px;}
      .category-name{font-size:1rem;padding:6px 8px;}
      .category-edit,.category-delete{padding:6px 10px;font-size:.85rem;}
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">Asian<span>3D Frames</span></div>
    <nav class="nav">
      <a href="../../admin/dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="../../admin/dashboard.html?view=orders"><i class="fas fa-shopping-bag"></i> Orders</a>
      <a href="../../admin/dashboard.html?view=add"><i class="fas fa-plus-circle"></i> Add Product</a>
      <a href="../../admin/dashboard.html?view=products"><i class="fas fa-box"></i> Manage Products</a>
      <a href="../../admin/dashboard.html?view=albums"><i class="fas fa-folder-open"></i> Manage Albums</a>
      <a href="../../admin/dashboard.html?view=categories" class="active"><i class="fas fa-tags"></i> Manage Categories</a>
      <a href="../../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
    </nav>
  </aside>

  <main class="main">
    <div class="top">
      <h1 class="title">Manage Categories</h1>
    </div>

    <section class="card">
      <div class="toolbar">
        <span><i class="fas fa-tags"></i> Categories</span>
      </div>
      <form class="add-category-form" id="addCategoryForm">
        <input type="text" id="newCategoryName" placeholder="Enter new category name..." required />
        <input type="file" id="newCategoryImage" accept="image/*" required />
        <button type="submit" class="btn primary"><i class="fas fa-plus-circle"></i> Add Category</button>
      </form>
      <div class="category-list" id="categoryList"></div>
      <div class="empty" id="emptyCategories" style="display:none;">No categories found.</div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function resolveImageSrc(path) {
        const raw = String(path || '').trim();
        if (!raw) return 'https://placehold.co/54x54/faf7f4/6b5c4e?text=No+Img';
        if (raw.startsWith('http://') || raw.startsWith('https://') || raw.startsWith('data:')) return raw;
        if (raw.startsWith('/')) return raw;
        // categories.html lives under /admin, so assets/ needs ../
        return '../' + raw.replace(/^\.\/?/, '');
      }

      // Fetch categories from backend
      async function fetchCategories() {
        const res = await fetch('../../php/get_categories.php');
        const data = await res.json();
        if (!data.success || !Array.isArray(data.categories)) return [];
        return data.categories;
      }

      async function renderCategories() {
        const categories = await fetchCategories();
        const list = document.getElementById('categoryList');
        const empty = document.getElementById('emptyCategories');
        if (!categories.length) {
          list.innerHTML = '';
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';
        list.innerHTML = categories.map((cat) => `
          <div class="category-item">
            <img src="${resolveImageSrc(cat.image)}" alt="${cat.name}" class="category-img" onerror="this.src='https://placehold.co/54x54/faf7f4/6b5c4e?text=No+Img';" />
            <input type="text" value="${cat.name}" class="category-name" data-id="${cat.id}" />
            <div class="category-actions">
              <button type="button" class="category-save" data-id="${cat.id}" style="display:none;background:#f59e42;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:.92rem;box-shadow:0 1px 4px rgba(245,158,66,.08);margin-right:6px;">Save</button>
              <button type="button" class="category-edit" data-id="${cat.id}">Edit Image</button>
              <button type="button" class="category-delete" data-id="${cat.id}">Delete</button>
            </div>
          </div>
        `).join('');
        // Add event listeners for name input changes
        Array.from(list.querySelectorAll('.category-name')).forEach(input => {
          const id = input.dataset.id;
          const saveBtn = input.parentElement.querySelector('.category-save');
          const origName = input.value;
          input.addEventListener('input', function() {
            if (input.value.trim() !== origName.trim()) {
              saveBtn.style.display = 'inline-block';
            } else {
              saveBtn.style.display = 'none';
            }
          });
        });
      }

      // Add category
      document.getElementById('addCategoryForm').onsubmit = async function(e) {
        e.preventDefault();
        const name = document.getElementById('newCategoryName').value.trim();
        const fileInput = document.getElementById('newCategoryImage');
        if (!name) return alert('Enter category name');
        if (!fileInput.files[0]) return alert('Select category image');
        
        const formData = new FormData();
        formData.append('name', name);
        formData.append('image', fileInput.files[0]);

        try {
          const response = await fetch('../../php/add_category.php', { method: 'POST', body: formData });
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const result = await response.json();
          if (!result.success) {
            throw new Error(result.message || 'Failed to add category.');
          }
          document.getElementById('newCategoryName').value = '';
          fileInput.value = '';
          renderCategories();
        } catch (error) {
          console.error('Error adding category:', error);
          alert('Error adding category: ' + error.message);
        }
      };

      async function updateCategory({ id, name, imageFile }) {
        const cleanId = String(id || '').trim();
        const cleanName = String(name || '').trim();
        if (!cleanId) return;
        if (!cleanName) return alert('Enter category name');

        const formData = new FormData();
        formData.append('id', cleanId);
        formData.append('name', cleanName);
        if (imageFile) formData.append('image', imageFile);

        const res = await fetch('../../php/update_category.php', { method: 'POST', body: formData });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
          alert(data.message || 'Failed to update category');
          return;
        }
        await renderCategories();
      }

      // Edit category image
      document.getElementById('categoryList').addEventListener('click', async function(e) {
        // Save category name
        if (e.target.classList.contains('category-save')) {
          const id = e.target.dataset.id;
          const item = e.target.closest('.category-item');
          const nameInput = item ? item.querySelector('.category-name') : null;
          const name = nameInput ? nameInput.value : '';
          await updateCategory({ id, name });
        }
        // Edit category image
        if (e.target.classList.contains('category-edit')) {
          const id = e.target.dataset.id;
          const item = e.target.closest('.category-item');
          const nameInput = item ? item.querySelector('.category-name') : null;
          const name = nameInput ? nameInput.value : '';
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*';
          input.onchange = async (ev) => {
            const file = ev.target.files && ev.target.files[0];
            if (!file) return;
            const latestName = nameInput ? nameInput.value : name;
            await updateCategory({ id, name: latestName, imageFile: file });
          };
          input.click();
        }
        // Delete category
        if (e.target.classList.contains('category-delete')) {
          const id = e.target.dataset.id;
          if (!confirm('Delete this category?')) return;
          const formData = new FormData();
          formData.append('id', id);
          await fetch('../../php/delete_category.php', { method: 'POST', body: formData });
          renderCategories();
        }
      });

      renderCategories();
    });
  </script>
</body>
</html>
